<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyASCF / ArkMiniRuntime</title>
  <link rel="stylesheet" href="./css/demo.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Phase 7 · Clipboard API</p>
      <h1>MyASCF / ArkMiniRuntime</h1>
      <p class="summary">
        当前阶段验证 Clipboard write/read 真实系统能力扩展。
      </p>
      <section class="apiSection">
        <h2>Toast API</h2>
        <div class="buttonGroup">
          <button id="demoButton" type="button">正常调用 ui.showToast</button>
          <button id="paramErrorButton" class="secondaryButton" type="button">参数错误测试</button>
          <button id="unknownActionButton" class="secondaryButton" type="button">未知 action 测试</button>
          <button id="timeoutButton" class="secondaryButton" type="button">Timeout 测试</button>
        </div>
      </section>
      <section class="apiSection">
        <h2>Clipboard API</h2>
        <input id="clipboardText" class="textInput" value="hello from MiniAppRuntime">
        <div class="buttonGroup">
          <button id="clipboardWriteButton" type="button">写入剪贴板</button>
          <button id="clipboardReadButton" class="secondaryButton" type="button">读取剪贴板</button>
          <button id="clipboardParamErrorButton" class="secondaryButton" type="button">剪贴板参数错误</button>
        </div>
      </section>
      <section class="apiSection storageSection">
        <h2>Storage API</h2>
        <input id="storageKey" class="textInput" value="username" aria-label="Storage key">
        <input id="storageValue" class="textInput" value="lichenyang" aria-label="Storage value">
        <div class="buttonGroup storageButtons">
          <button id="storageSetButton" type="button">写入 Storage</button>
          <button id="storageGetButton" class="secondaryButton" type="button">读取 Storage</button>
          <button id="storageRemoveButton" class="secondaryButton" type="button">删除 Storage</button>
          <button id="storageClearButton" class="secondaryButton" type="button">清空 Storage</button>
          <button id="storageParamErrorButton" class="secondaryButton" type="button">Storage 参数错误</button>
        </div>
      </section>
      <p id="status" class="status">等待 H5 发起调用。</p>
      <pre id="result" class="result">暂无响应</pre>
      <pre id="eventLog" class="eventLog">暂无事件</pre>
    </section>
    <section class="debugPanel">
      <div class="debugPanelHeader">
        <div>
          <p class="eyebrow">JSBridge Debug Panel</p>
          <h2>Bridge 调用记录</h2>
        </div>
        <div class="debugActions">
          <button id="debugClearButton" class="secondaryButton" type="button">清空</button>
          <button id="debugExportButton" class="secondaryButton" type="button">导出 JSON</button>
        </div>
      </div>
      <div id="debugRecords" class="debugRecords"></div>
      <pre id="debugExportOutput" class="debugExportOutput"></pre>
    </section>
  </main>

  <script src="./js/debug-panel.js"></script>
  <script src="./js/myascf.js"></script>
  <script src="./js/demo.js"></script>
</body>
</html>
