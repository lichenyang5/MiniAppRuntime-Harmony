<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>npm SDK + HAR Runtime Demo</title>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="eyebrow">MiniAppRuntime-Harmony</p>
      <h1>npm SDK + local HAR</h1>
      <p id="environment" class="environment">Checking bridge environment...</p>
    </header>

    <section class="actions" aria-label="Runtime API actions">
      <button id="toast" type="button">Show Toast</button>
      <button id="clipboard" type="button">Read Clipboard</button>
      <button id="storage" type="button">Storage Round Trip</button>
      <button id="api-list" type="button">Read API Manifest</button>
      <button id="network" type="button">GET example.com</button>
    </section>

    <section class="result-panel" aria-live="polite">
      <h2>Latest result</h2>
      <p id="status">Ready</p>
      <pre id="result">No request yet.</pre>
    </section>

    <section class="debug-panel">
      <div class="section-heading">
        <h2>Bridge timeline</h2>
        <span id="debug-count">0 records</span>
      </div>
      <div id="debug-records" class="debug-records"></div>
    </section>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
