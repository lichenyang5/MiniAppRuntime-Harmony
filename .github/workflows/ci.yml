name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            h5_sdk/package-lock.json
            examples/npm-har-consumer-demo/web/package-lock.json

      - name: Install H5 SDK dependencies
        working-directory: h5_sdk
        run: npm ci

      - name: Check generated docs and types
        run: npm run check:generated

      - name: Check API Manifest consistency
        run: npm run check:api

      - name: Build H5 SDK
        working-directory: h5_sdk
        run: npm run build

      - name: Test H5 SDK
        working-directory: h5_sdk
        run: npm run test:unit

      - name: Preview npm package
        working-directory: h5_sdk
        run: npm run pack:dry-run

      - name: Check package exports
        run: npm run check:package

      - name: Install independent Web Demo dependencies
        working-directory: examples/npm-har-consumer-demo/web
        run: npm ci

      - name: Build and sync independent Web Demo
        working-directory: examples/npm-har-consumer-demo/web
        run: npm run build:harmony

      - name: Check committed rawfile is current
        run: git diff --exit-code -- examples/npm-har-consumer-demo/harmony/entry/src/main/resources/rawfile/web

      - name: Check documentation links
        run: npm run check:docs

      - name: Check public content
        run: npm run check:public

      - name: Check HAR release metadata
        run: npm run check:har-release

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MiniAppRuntime-Harmony CI"
            echo
            echo "This workflow checks generated files, API registration, H5 SDK build/tests/package entries, documentation links, public-content hygiene, and HAR release metadata."
            echo
            echo "HarmonyOS HAR/HAP builds and device behavior remain local-only parts of the manual smoke test."
          } >> "$GITHUB_STEP_SUMMARY"
